<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malibu Beach Club</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1726;color:#fff}
    .wrap{max-width:1000px;margin:0 auto;padding:28px 16px}
    h1{font-size:clamp(2rem,4vw,3.2rem);margin:0 0 8px;color:#7dd3fc}
    p{opacity:.9;line-height:1.5}
    .card{margin-top:20px;background:#10243a;border:1px solid #1f3b56;border-radius:16px;padding:14px}
    img{width:100%;display:block;border-radius:12px}
    .note{font-size:.95rem;color:#cbd5e1;margin-top:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Malibu Beach Club</h1>
    <p>Repositorio separado de Camarón Yankee para trabajar el sitio de Malibu de forma independiente.</p>
    <div class="card">
      <img src="menu_malibu_beach_club_sun_full.jpg" alt="Menú Malibu Beach Club" />
      <div class="note">Base inicial cargada ✅. Siguiente paso: diseñar flujo de reservaciones propio de Malibu.</div>
    </div>
  </div>
</body>
</html>
